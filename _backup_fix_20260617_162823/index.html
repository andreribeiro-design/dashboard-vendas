<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard de Vendas e Margens</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-heading">
          <button id="brand-reset" class="brand-button" type="button" title="Restaurar base">
            <img src="./logo_nosso.png" alt="Logo" />
          </button>
          <div>
            <p class="eyebrow">Diretoria Comercial</p>
            <h1>Dashboard de Vendas e Margens</h1>
          </div>
        </div>

        <div class="header-actions">
          <button id="import-sales-button" class="import-button" type="button">
            <span class="button-token">CSV</span>
            Importar vendas
          </button>
          <input id="sales-file-input" type="file" accept=".csv,.txt" class="sr-only" />
          <span id="import-status" class="status-pill">Base carregada</span>
        </div>
      </header>

      <section id="filters" class="filter-panel"></section>
      <section id="kpi-cards" class="kpi-grid"></section>

      <div class="visual-grid">
        <section id="monthly-chart" class="panel"></section>
        <section id="buyer-ranking" class="panel"></section>
      </div>

      <section id="data-table" class="panel panel-wide"></section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
