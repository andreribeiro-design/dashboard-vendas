<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard de Vendas e Margens</title>
  <link rel="stylesheet" href="./styles/main.css?v=20260617-logo-import-fix" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand-heading">
        <button id="brand-reset" class="brand-button" type="button" title="Recarregar base padrão">
          <img src="./logo_nosso.png" alt="NOSSO Atacarejo" onerror="this.src='./logo.png';this.onerror=null;" />
        </button>
        <div>
          <p class="eyebrow">Diretoria Comercial</p>
          <h1>Dashboard de Vendas e Margens</h1>
        </div>
      </div>

      <div class="header-actions">
        <button id="import-sales-button" class="import-button" type="button">
          <span class="button-token">CSV</span> Importar vendas
        </button>
        <input id="sales-file-input" type="file" accept=".csv,.txt" class="sr-only" />
        <span id="import-status" class="status-pill">Base carregada</span>
      </div>
    </header>

    <section id="filters" class="filter-panel"></section>
    <section id="kpi-cards" class="kpi-grid"></section>

    <div class="visual-grid">
      <section class="panel">
        <header class="panel-header">
          <div>
            <h2>Evolução mensal</h2>
            <p>Vendas líquidas e margem fiscal</p>
          </div>
          <span id="line-chart-badge" class="metric-badge"></span>
        </header>
        <div id="monthly-chart"></div>
      </section>

      <section id="buyer-ranking" class="panel">
        <header class="panel-header">
          <div>
            <h2>Ranking por comprador</h2>
            <p>Participação em vendas</p>
          </div>
        </header>
      </section>
    </div>

    <section id="data-table" class="panel panel-wide"></section>
  </main>

  <script type="module" src="./src/app.js?v=20260617-logo-import-fix"></script>
  <script type="module" src="./src/stock-tab.js?v=20260617-stock"></script>
</body>
</html>
